# ConversaJá — sobe banco (Postgres), backend (NestJS) e frontend (nginx).
# Uso: docker compose up --build  ->  acesse http://localhost:8080
services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: conversaja
      POSTGRES_PASSWORD: conversaja
      POSTGRES_DB: conversaja
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U conversaja']
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  backend:
    build:
      context: .
      dockerfile: apps/backend/Dockerfile
    environment:
      - PORT=3000
      - NODE_ENV=production
      - DATABASE_URL=postgresql://conversaja:conversaja@db:5432/conversaja
      # Troque por um valor forte em produção (acesso ao painel admin).
      - ADMIN_TOKEN=admin
    depends_on:
      db:
        condition: service_healthy
    expose:
      - '3000'
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: apps/frontend/Dockerfile
    ports:
      - '8080:80'
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  pgdata:
