name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configurar Node
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: npm

      # postinstall compila packages/shared automaticamente
      - name: Instalar dependências
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Testes (backend + frontend)
        run: npm test

      - name: Teste e2e (fluxo WebSocket)
        run: npm run test:e2e

      - name: Build (shared + backend + frontend)
        run: npm run build
